smart_url:
  name: Smart play URL
  description: Resolve and play a shared URL in RelayTV (RelayTV POST /smart).
  fields:
    url:
      required: true
      example: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      selector:
        text:

play_now:
  name: Play now
  description: Play a URL immediately (RelayTV POST /play). This clears the queue.
  fields:
    url:
      required: true
      example: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      selector:
        text:
    use_ytdlp:
      required: false
      default: true
      selector:
        boolean:
    cec:
      required: false
      default: false
      selector:
        boolean:

announce:
  name: Announce
  description: Alias for play_now. (RelayTV does not currently implement a distinct announcement mode.)
  fields:
    url:
      required: true
      example: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      selector:
        text:
    use_ytdlp:
      required: false
      default: true
      selector:
        boolean:
    cec:
      required: false
      default: false
      selector:
        boolean:
